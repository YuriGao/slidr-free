name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Run core checks
        run: swift run SlidrFreeCoreChecks

      - name: Run tests
        run: swift test

      - name: Build
        run: swift build

      - name: Validate scripts and localizations
        run: |
          bash -n scripts/package-release.sh scripts/verify-release.sh scripts/test-verify-release-signature.sh
          plutil -lint Resources/en.lproj/Localizable.strings Resources/zh-Hans.lproj/Localizable.strings

      - name: Package development artifact
        run: bash scripts/package-release.sh

      - name: Verify release contract
        run: bash scripts/verify-release.sh

      - name: Test ad-hoc signature contract
        run: bash scripts/test-verify-release-signature.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Slidr-Free-development-adhoc
          path: release/Slidr-Free.app.zip
